<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:include="include :: header('预约详情')"/>
    <style>
        .detail-card {
            background: #fff;
            border-radius: 4px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .detail-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #eee;
        }
        .detail-item {
            margin-bottom: 10px;
            display: flex;
        }
        .detail-label {
            width: 120px;
            color: #666;
            flex-shrink: 0;
        }
        .detail-value {
            color: #333;
            flex: 1;
        }
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 14px;
        }
        .status-0 { background: #fff3cd; color: #856404; }
        .status-1 { background: #cce5ff; color: #004085; }
        .status-2 { background: #f8d7da; color: #721c24; }
        .status-3 { background: #d4edda; color: #155724; }
        .status-4 { background: #e2e3e5; color: #383d41; }

        .flow-steps {
            display: flex;
            align-items: flex-start;
            padding: 30px 10px 10px;
            position: relative;
        }
        .flow-step {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            z-index: 1;
        }
        .flow-step:not(:last-child)::after {
            content: '';
            position: absolute;
            top: 22px;
            left: 50%;
            width: 100%;
            height: 3px;
            z-index: 0;
        }
        .flow-step.completed:not(:last-child)::after {
            background: #5FB878;
        }
        .flow-step.active:not(:last-child)::after,
        .flow-step.pending:not(:last-child)::after {
            background: #e2e2e2;
        }
        .step-icon {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            color: #fff;
            position: relative;
            z-index: 2;
            margin-bottom: 10px;
        }
        .flow-step.completed .step-icon { background: #5FB878; }
        .flow-step.active .step-icon { background: #1E9FFF; animation: pulse 2s infinite; }
        .flow-step.pending .step-icon { background: #e2e2e2; color: #999; }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(30,159,255,0.4); }
            70% { box-shadow: 0 0 0 10px rgba(30,159,255,0); }
            100% { box-shadow: 0 0 0 0 rgba(30,159,255,0); }
        }
        .step-title {
            font-size: 15px;
            font-weight: bold;
            margin-bottom: 4px;
            color: #333;
        }
        .flow-step.pending .step-title { color: #999; }
        .step-status {
            font-size: 12px;
            margin-bottom: 8px;
        }
        .flow-step.completed .step-status { color: #5FB878; }
        .flow-step.active .step-status { color: #1E9FFF; }
        .flow-step.pending .step-status { color: #999; }

        .node-card {
            background: #fafafa;
            border-radius: 6px;
            padding: 15px;
            margin-top: 8px;
            width: 90%;
            max-width: 280px;
            border: 1px solid #eee;
        }
        .node-card .node-time {
            font-size: 12px;
            color: #999;
            margin-bottom: 6px;
        }
        .node-card .node-remark {
            font-size: 13px;
            color: #666;
            margin-bottom: 8px;
            word-break: break-all;
        }
        .node-card .node-photos {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 8px;
        }
        .node-card .node-photos img {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 4px;
            cursor: pointer;
            border: 1px solid #eee;
        }
        .node-card .node-actions {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .no-flow-tip {
            text-align: center;
            padding: 60px 20px;
            color: #999;
            font-size: 14px;
        }
        .no-flow-tip i {
            font-size: 48px;
            display: block;
            margin-bottom: 16px;
            color: #ccc;
        }
    </style>
</head>
<body class="pear-container">
<div class="layui-tab layui-tab-brief" lay-filter="detailTab" style="margin: 0;">
    <ul class="layui-tab-title">
        <li class="layui-this">预约信息</li>
        <li>服务流程</li>
    </ul>
    <div class="layui-tab-content" style="padding: 0 15px;">
        <div class="layui-tab-item layui-show">
            <div class="detail-card">
                <div class="detail-title">预约信息</div>
                <div class="layui-row">
                    <div class="layui-col-md6">
                        <div class="detail-item">
                            <span class="detail-label">预约单号：</span>
                            <span class="detail-value" th:text="${appointment.appointmentNo}"></span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">客户姓名：</span>
                            <span class="detail-value" th:text="${appointment.customerName}"></span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">客户电话：</span>
                            <span class="detail-value" th:text="${appointment.customerPhone}"></span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">宠物名称：</span>
                            <span class="detail-value" th:text="${appointment.petName}"></span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">服务类型：</span>
                            <span class="detail-value" th:text="${appointment.serviceName}"></span>
                        </div>
                    </div>
                    <div class="layui-col-md6">
                        <div class="detail-item">
                            <span class="detail-label">预约时间：</span>
                            <span class="detail-value" th:text="${#dates.format(appointment.appointmentTime, 'yyyy-MM-dd HH:mm:ss')}"></span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">预计结束：</span>
                            <span class="detail-value" th:text="${#dates.format(appointment.endTime, 'yyyy-MM-dd HH:mm:ss')}"></span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">实际开始：</span>
                            <span class="detail-value" th:text="${appointment.actualStartTime} ? ${#dates.format(appointment.actualStartTime, 'yyyy-MM-dd HH:mm:ss')} : '未开始'"></span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">实际结束：</span>
                            <span class="detail-value" th:text="${appointment.actualEndTime} ? ${#dates.format(appointment.actualEndTime, 'yyyy-MM-dd HH:mm:ss')} : '未结束'"></span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">金额：</span>
                            <span class="detail-value" style="color: #f56c6c; font-weight: bold;" th:text="'¥' + ${appointment.amount}"></span>
                        </div>
                    </div>
                </div>
                <div class="layui-row">
                    <div class="layui-col-md6">
                        <div class="detail-item">
                            <span class="detail-label">状态：</span>
                            <span class="detail-value">
                                <span class="status-badge" th:class="'status-' + ${appointment.status}" th:text="${appointment.statusName}"></span>
                            </span>
                        </div>
                    </div>
                    <div class="layui-col-md6">
                        <div class="detail-item">
                            <span class="detail-label">创建时间：</span>
                            <span class="detail-value" th:text="${#dates.format(appointment.createTime, 'yyyy-MM-dd HH:mm:ss')}"></span>
                        </div>
                    </div>
                </div>
                <div class="detail-item" style="margin-top: 20px;">
                    <span class="detail-label">备注：</span>
                    <span class="detail-value" th:text="${appointment.remark} ?: '无'"></span>
                </div>
            </div>
        </div>
        <div class="layui-tab-item">
            <div id="flowContainer"></div>
        </div>
    </div>
</div>
</body>
<th:block th:include="include :: footer"/>
<script>
    layui.use(['element', 'jquery', 'upload', 'layer'], function () {
        var element = layui.element;
        var $ = layui.jquery;
        var upload = layui.upload;
        var layer = layui.layer;

        var MODULE_PATH = rootPath + "/ServiceFlowController";
        var appointmentId = [[${appointment.id}]];
        var appointmentStatus = '[[${appointment.status}]]';

        function loadFlowNodes() {
            $.ajax({
                url: MODULE_PATH + '/list/' + appointmentId,
                type: 'get',
                dataType: 'json',
                success: function (res) {
                    if (res.code == 200 && res.data && res.data.length > 0) {
                        renderFlowSteps(res.data);
                    } else {
                        $('#flowContainer').html(
                            '<div class="no-flow-tip">' +
                            '<i class="layui-icon layui-icon-date"></i>' +
                            '预约状态为"服务中"时将自动创建服务流程节点' +
                            '</div>'
                        );
                    }
                }
            });
        }

        function renderFlowSteps(nodes) {
            var html = '<div class="flow-steps">';
            for (var i = 0; i < nodes.length; i++) {
                var node = nodes[i];
                var statusClass = '';
                if (node.status == '2') statusClass = 'completed';
                else if (node.status == '1') statusClass = 'active';
                else statusClass = 'pending';

                var icon = '';
                if (statusClass == 'completed') icon = '<i class="layui-icon layui-icon-ok"></i>';
                else icon = (i + 1);

                var statusText = '';
                if (statusClass == 'completed') statusText = '已完成';
                else if (statusClass == 'active') statusText = '进行中';
                else statusText = '待处理';

                html += '<div class="flow-step ' + statusClass + '">';
                html += '<div class="step-icon">' + icon + '</div>';
                html += '<div class="step-title">' + node.nodeName + '</div>';
                html += '<div class="step-status">' + statusText + '</div>';
                html += '<div class="node-card">';

                if (node.completeTime) {
                    html += '<div class="node-time">完成时间：' + node.completeTime + '</div>';
                }
                if (node.remark) {
                    html += '<div class="node-remark">' + node.remark + '</div>';
                }

                if (node.photos && node.photos.length > 0) {
                    html += '<div class="node-photos">';
                    for (var j = 0; j < node.photos.length; j++) {
                        html += '<img src="' + node.photos[j].photoUrl + '" onclick="previewPhoto(this.src)">';
                    }
                    html += '</div>';
                }

                if (appointmentStatus == '2') {
                    html += '<div class="node-actions">';
                    if (statusClass == 'active') {
                        html += '<button class="layui-btn layui-btn-xs layui-btn-normal" onclick="completeNode(' + node.id + ')">标记完成</button>';
                    }
                    html += '<button class="layui-btn layui-btn-xs" onclick="editRemark(' + node.id + ', \'' + (node.remark || '').replace(/'/g, "\\'") + '\')">备注</button>';
                    html += '<button class="layui-btn layui-btn-xs layui-btn-warm" onclick="uploadPhoto(' + node.id + ')">上传照片</button>';
                    html += '</div>';
                }

                html += '</div>';
                html += '</div>';
            }
            html += '</div>';
            $('#flowContainer').html(html);
        }

        window.completeNode = function (id) {
            layer.confirm('确定标记该节点为已完成？完成后将自动激活下一个节点。', {icon: 3, title: '提示'}, function (index) {
                layer.close(index);
                layer.prompt({
                    formType: 2,
                    title: '完成备注（可选）',
                    area: ['300px', '100px']
                }, function (value, idx) {
                    layer.close(idx);
                    var loading = layer.load();
                    $.ajax({
                        url: MODULE_PATH + '/completeNode',
                        data: {id: id, remark: value || ''},
                        type: 'post',
                        dataType: 'json',
                        success: function (result) {
                            layer.close(loading);
                            if (result.code == 200) {
                                layer.msg(result.msg, {icon: 1, time: 1000}, function () {
                                    loadFlowNodes();
                                });
                            } else {
                                layer.msg(result.msg, {icon: 2, time: 1500});
                            }
                        }
                    });
                });
            });
        };

        window.editRemark = function (id, currentRemark) {
            layer.prompt({
                formType: 2,
                title: '编辑备注',
                value: currentRemark || '',
                area: ['300px', '100px']
            }, function (value, index) {
                layer.close(index);
                var loading = layer.load();
                $.ajax({
                    url: MODULE_PATH + '/updateRemark',
                    data: {id: id, remark: value || ''},
                    type: 'post',
                    dataType: 'json',
                    success: function (result) {
                        layer.close(loading);
                        if (result.code == 200) {
                            layer.msg(result.msg, {icon: 1, time: 1000}, function () {
                                loadFlowNodes();
                            });
                        } else {
                            layer.msg(result.msg, {icon: 2, time: 1500});
                        }
                    }
                });
            });
        };

        window.uploadPhoto = function (id) {
            var inputId = 'photoInput_' + id;
            var $input = $('<input type="file" id="' + inputId + '" accept="image/*" style="display:none;">');
            $('body').append($input);
            $input.on('change', function () {
                var file = this.files[0];
                if (!file) return;
                var formData = new FormData();
                formData.append('file', file);
                formData.append('id', id);
                var loading = layer.load();
                $.ajax({
                    url: MODULE_PATH + '/uploadPhoto',
                    data: formData,
                    type: 'post',
                    dataType: 'json',
                    processData: false,
                    contentType: false,
                    success: function (result) {
                        layer.close(loading);
                        if (result.code == 200) {
                            layer.msg(result.msg, {icon: 1, time: 1000}, function () {
                                loadFlowNodes();
                            });
                        } else {
                            layer.msg(result.msg, {icon: 2, time: 1500});
                        }
                    },
                    complete: function () {
                        $input.remove();
                    }
                });
            });
            $input.click();
        };

        window.previewPhoto = function (src) {
            layer.photos({
                photos: {
                    data: [{src: src, alt: '服务流程照片'}]
                },
                anim: 5
            });
        };

        element.on('tab(detailTab)', function (data) {
            if (data.index == 1) {
                loadFlowNodes();
            }
        });

        loadFlowNodes();
    });
</script>
</html>
