<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:include="include :: header('新增订单')"/>
    <style>
        .item-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        .item-table th, .item-table td {
            border: 1px solid #e6e6e6;
            padding: 8px;
            text-align: center;
        }
        .item-table th {
            background-color: #f2f2f2;
            font-weight: bold;
        }
        .price-cell {
            color: #f56c6c;
            font-weight: bold;
        }
        .select-type-group {
            margin-bottom: 15px;
        }
        .package-section, .items-section {
            margin-top: 10px;
        }
    </style>
</head>
<body>
<form class="layui-form">
    <div class="mainBox">
        <div class="main-container">
            <input type="hidden" name="itemsJson" id="itemsJson">

            <div class="layui-form-item">
                <label class="layui-form-label">关联预约</label>
                <div class="layui-input-block">
                    <select name="appointmentId" lay-filter="appointmentSelect">
                        <option value="">请选择预约（可选）</option>
                        <option th:each="appointment : ${appointmentList}" th:value="${appointment.id}" th:text="${appointment.appointmentNo} + ' - ' + ${appointment.customerName}"></option>
                    </select>
                </div>
            </div>

            <div class="layui-form-item">
                <label class="layui-form-label">客户姓名<span style="color: red;">*</span></label>
                <div class="layui-input-block">
                    <input type="text" name="customerName" id="customerName" autocomplete="off" placeholder="请输入客户姓名" class="layui-input" lay-verify="required" required>
                </div>
            </div>

            <div class="layui-form-item">
                <label class="layui-form-label">客户电话<span style="color: red;">*</span></label>
                <div class="layui-input-block">
                    <input type="text" name="customerPhone" id="customerPhone" autocomplete="off" placeholder="请输入客户电话" class="layui-input" lay-verify="required|phone" required>
                </div>
            </div>

            <div class="layui-form-item">
                <label class="layui-form-label">选择宠物<span style="color: red;">*</span></label>
                <div class="layui-input-block">
                    <select name="petId" id="petSelect" lay-verify="required" required>
                        <option value="">请选择宠物</option>
                        <option th:each="pet : ${petList}" th:value="${pet.id}" th:text="${pet.name} + ' - ' + ${pet.ownerName}"></option>
                    </select>
                </div>
            </div>

            <div class="layui-form-item">
                <label class="layui-form-label">选择方式<span style="color: red;">*</span></label>
                <div class="layui-input-block select-type-group">
                    <input type="radio" name="selectType" value="package" title="选套餐" lay-filter="selectType" checked>
                    <input type="radio" name="selectType" value="items" title="选商品" lay-filter="selectType">
                </div>
            </div>

            <div class="layui-form-item package-section" id="packageSection">
                <label class="layui-form-label">选择套餐<span style="color: red;">*</span></label>
                <div class="layui-input-block">
                    <select name="packageId" id="packageSelect" lay-filter="packageSelect">
                        <option value="">请选择套餐</option>
                        <option th:each="pkg : ${packageList}" th:value="${pkg.id}" th:text="${pkg.name} + ' - ¥' + ${pkg.packagePrice}" th:data-original="${pkg.originalPrice}" th:data-package="${pkg.packagePrice}"></option>
                    </select>
                </div>
            </div>

            <div class="layui-form-item items-section" id="itemsSection" style="display: none;">
                <label class="layui-form-label">选择商品</label>
                <div class="layui-input-block">
                    <button type="button" class="pear-btn pear-btn-primary pear-btn-sm" id="addItemBtn">
                        <i class="layui-icon layui-icon-add-1"></i>
                        添加商品
                    </button>
                    <table class="item-table" id="itemTable">
                        <thead>
                            <tr>
                                <th style="width: 40%;">服务类型</th>
                                <th style="width: 20%;">单价</th>
                                <th style="width: 15%;">数量</th>
                                <th style="width: 15%;">小计</th>
                                <th style="width: 10%;">操作</th>
                            </tr>
                        </thead>
                        <tbody id="itemTbody">
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="layui-form-item">
                <label class="layui-form-label">原价金额</label>
                <div class="layui-input-block">
                    <input type="text" id="originalAmountShow" autocomplete="off" class="layui-input price-cell" readonly value="¥0.00">
                    <input type="hidden" name="originalAmount" id="originalAmount">
                </div>
            </div>

            <div class="layui-form-item">
                <label class="layui-form-label">订单金额<span style="color: red;">*</span></label>
                <div class="layui-input-block">
                    <input type="text" name="orderAmount" id="orderAmount" autocomplete="off" placeholder="请输入订单金额" class="layui-input price-cell" lay-verify="required|number" required value="0.00">
                </div>
            </div>

            <div class="layui-form-item">
                <label class="layui-form-label">备注</label>
                <div class="layui-input-block">
                    <textarea name="remark" placeholder="请输入备注" class="layui-textarea"></textarea>
                </div>
            </div>
        </div>
    </div>
    <div class="bottom">
        <div class="button-container">
            <button type="submit" class="layui-btn layui-btn-normal layui-btn-sm" lay-submit="" lay-filter="order-save">
                <i class="layui-icon layui-icon-ok"></i>
                提交
            </button>
            <button type="reset" class="layui-btn layui-btn-primary layui-btn-sm">
                <i class="layui-icon layui-icon-refresh"></i>
                重置
            </button>
        </div>
    </div>
</form>
<th:block th:include="include :: footer"/>
<script>
    layui.use(['form', 'jquery'], function () {
        let form = layui.form;
        let $ = layui.jquery;
        let MODULE_PATH = rootPath + "/OrderController";

        form.render();

        let serviceTypeList = [];
        <th:block th:each="service : ${serviceTypeList}">
        serviceTypeList.push({
            id: [[${service.id}]],
            name: '[[${service.name}]]',
            price: [[${service.price}]]
        });
        </th:block>

        let currentSelectType = 'package';

        form.on('select(appointmentSelect)', function(data) {
            let appointmentId = data.value;
            if (appointmentId) {
                $.ajax({
                    url: MODULE_PATH + '/getCustomerByAppointment/' + appointmentId,
                    dataType: 'json',
                    type: 'get',
                    success: function(result) {
                        if (result.code == 200 && result.data) {
                            let appointment = result.data;
                            $('#customerName').val(appointment.customerName);
                            $('#customerPhone').val(appointment.customerPhone);
                            if (appointment.petId) {
                                $('#petSelect').val(appointment.petId);
                            }
                            form.render();
                        }
                    }
                });
            }
        });

        form.on('radio(selectType)', function(data) {
            currentSelectType = data.value;
            if (currentSelectType === 'package') {
                $('#packageSection').show();
                $('#itemsSection').hide();
                calculateByPackage();
            } else {
                $('#packageSection').hide();
                $('#itemsSection').show();
                calculateByItems();
            }
        });

        form.on('select(packageSelect)', function(data) {
            calculateByPackage();
        });

        function calculateByPackage() {
            let selectedOption = $('#packageSelect option:selected');
            let originalPrice = parseFloat(selectedOption.data('original')) || 0;
            let packagePrice = parseFloat(selectedOption.data('package')) || 0;
            $('#originalAmountShow').val('¥' + originalPrice.toFixed(2));
            $('#originalAmount').val(originalPrice.toFixed(2));
            $('#orderAmount').val(packagePrice.toFixed(2));
        }

        function getServiceTypeOptions(selectedId) {
            let html = '<select class="service-type-select" lay-ignore>';
            html += '<option value="">请选择服务类型</option>';
            for (let i = 0; i < serviceTypeList.length; i++) {
                let s = serviceTypeList[i];
                let selected = (selectedId && s.id == selectedId) ? 'selected' : '';
                html += '<option value="' + s.id + '" data-price="' + s.price + '" ' + selected + '>' + s.name + ' - ¥' + s.price + '</option>';
            }
            html += '</select>';
            return html;
        }

        function addItem(serviceTypeId, quantity) {
            let tr = $('<tr></tr>');
            tr.append('<td>' + getServiceTypeOptions(serviceTypeId) + '</td>');
            tr.append('<td class="price-cell unit-price">¥0.00</td>');
            let qty = quantity ? quantity : 1;
            tr.append('<td><input type="number" class="layui-input quantity-input" value="' + qty + '" min="1" style="height:30px;line-height:30px;"></td>');
            tr.append('<td class="price-cell subtotal">¥0.00</td>');
            tr.append('<td><button type="button" class="pear-btn pear-btn-danger pear-btn-xs delete-item"><i class="layui-icon layui-icon-delete"></i></button></td>');
            $('#itemTbody').append(tr);
            bindItemEvents(tr);
            updateRowPrice(tr);
        }

        function bindItemEvents(tr) {
            tr.find('.service-type-select').on('change', function () {
                updateRowPrice(tr);
                calculateByItems();
            });
            tr.find('.quantity-input').on('input', function () {
                let val = parseInt($(this).val());
                if (isNaN(val) || val < 1) {
                    $(this).val(1);
                }
                updateRowPrice(tr);
                calculateByItems();
            });
            tr.find('.delete-item').on('click', function () {
                tr.remove();
                calculateByItems();
            });
        }

        function updateRowPrice(tr) {
            let select = tr.find('.service-type-select');
            let selectedOption = select.find('option:selected');
            let price = parseFloat(selectedOption.data('price')) || 0;
            let quantity = parseInt(tr.find('.quantity-input').val()) || 1;
            let subtotal = price * quantity;
            tr.find('.unit-price').text('¥' + price.toFixed(2));
            tr.find('.subtotal').text('¥' + subtotal.toFixed(2));
        }

        function calculateByItems() {
            let total = 0;
            $('#itemTbody tr').each(function () {
                let select = $(this).find('.service-type-select');
                let selectedOption = select.find('option:selected');
                let price = parseFloat(selectedOption.data('price')) || 0;
                let quantity = parseInt($(this).find('.quantity-input').val()) || 1;
                total += price * quantity;
            });
            $('#originalAmountShow').val('¥' + total.toFixed(2));
            $('#originalAmount').val(total.toFixed(2));
            if (parseFloat($('#orderAmount').val()) === 0 || !$('#orderAmount').val()) {
                $('#orderAmount').val(total.toFixed(2));
            }
        }

        function serializeItems() {
            let items = [];
            $('#itemTbody tr').each(function () {
                let select = $(this).find('.service-type-select');
                let serviceTypeId = select.val();
                let selectedOption = select.find('option:selected');
                let price = parseFloat(selectedOption.data('price')) || 0;
                let serviceName = selectedOption.text().split(' - ')[0] || '';
                let quantity = parseInt($(this).find('.quantity-input').val()) || 1;
                if (serviceTypeId) {
                    items.push({
                        serviceTypeId: serviceTypeId,
                        serviceName: serviceName,
                        price: price,
                        quantity: quantity,
                        subtotal: (price * quantity).toFixed(2)
                    });
                }
            });
            $('#itemsJson').val(JSON.stringify(items));
        }

        $('#addItemBtn').on('click', function () {
            addItem(null, 1);
        });

        form.verify({
            phone: function(value){
                if(!/^1[3-9]\d{9}$/.test(value)){
                    return '请输入正确的手机号码';
                }
            }
        });

        form.on('submit(order-save)', function (data) {
            if (currentSelectType === 'package') {
                if (!$('#packageSelect').val()) {
                    layer.msg('请选择套餐', {icon: 2, time: 1000});
                    return false;
                }
                $('#itemsJson').val('');
            } else {
                if ($('#itemTbody tr').length === 0) {
                    layer.msg('请至少添加一个商品', {icon: 2, time: 1000});
                    return false;
                }
                let hasEmpty = false;
                $('#itemTbody tr').each(function () {
                    if (!$(this).find('.service-type-select').val()) {
                        hasEmpty = true;
                        return false;
                    }
                });
                if (hasEmpty) {
                    layer.msg('请选择服务类型', {icon: 2, time: 1000});
                    return false;
                }
                serializeItems();
                data.field.packageId = '';
            }

            let loading = layer.load();
            $.ajax({
                url: MODULE_PATH + '/add',
                data: data.field,
                dataType: 'json',
                contentType: 'application/x-www-form-urlencoded',
                type: 'post',
                success: function (result) {
                    layer.close(loading);
                    if (result.code == 200) {
                        layer.msg(result.msg, {icon: 1, time: 1000}, function () {
                            parent.layer.close(parent.layer.getFrameIndex(window.name));
                            parent.layui.table.reload("order-table");
                        });
                    } else {
                        layer.msg(result.msg, {icon: 2, time: 1000});
                    }
                }
            })
            return false;
        });
    })
</script>
</body>
</html>
