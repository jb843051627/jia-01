<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:include="include :: header('宠物详情')"/>
    <style>
        .detail-card {
            background: #fff;
            border-radius: 4px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .detail-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #eee;
        }
        .detail-item {
            margin-bottom: 10px;
            display: flex;
        }
        .detail-label {
            width: 100px;
            color: #666;
            flex-shrink: 0;
        }
        .detail-value {
            color: #333;
            flex: 1;
        }
        .photo-wall {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .photo-item {
            width: 150px;
            height: 150px;
            border-radius: 4px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .photo-item:hover {
            transform: scale(1.05);
        }
        .photo-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .no-photo {
            color: #999;
            padding: 40px;
            text-align: center;
        }
        .record-table {
            width: 100%;
            border-collapse: collapse;
        }
        .record-table th, .record-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        .record-table th {
            background: #f5f5f5;
            font-weight: normal;
        }
        .status-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 3px;
            font-size: 12px;
        }
        .status-0 { background: #fff3cd; color: #856404; }
        .status-1 { background: #cce5ff; color: #004085; }
        .status-2 { background: #f8d7da; color: #721c24; }
        .status-3 { background: #d4edda; color: #155724; }
        .status-4 { background: #e2e3e5; color: #383d41; }
    </style>
</head>
<body class="pear-container">
<div class="detail-card">
    <div class="detail-title">基本信息</div>
    <div class="layui-row">
        <div class="layui-col-md6">
            <div class="detail-item">
                <span class="detail-label">宠物名字：</span>
                <span class="detail-value" th:text="${pet.name}"></span>
            </div>
            <div class="detail-item">
                <span class="detail-label">品种：</span>
                <span class="detail-value" th:text="${pet.breed}"></span>
            </div>
            <div class="detail-item">
                <span class="detail-label">年龄：</span>
                <span class="detail-value" th:text="${pet.age} + '岁'"></span>
            </div>
            <div class="detail-item">
                <span class="detail-label">性别：</span>
                <span class="detail-value">
                    <span th:if="${pet.gender == '0'}" class="pear-badge pear-badge-primary">公</span>
                    <span th:if="${pet.gender == '1'}" class="pear-badge pear-badge-danger">母</span>
                </span>
            </div>
        </div>
        <div class="layui-col-md6">
            <div class="detail-item">
                <span class="detail-label">主人姓名：</span>
                <span class="detail-value" th:text="${pet.ownerName}"></span>
            </div>
            <div class="detail-item">
                <span class="detail-label">主人电话：</span>
                <span class="detail-value" th:text="${pet.ownerPhone}"></span>
            </div>
            <div class="detail-item">
                <span class="detail-label">创建时间：</span>
                <span class="detail-value" th:text="${#dates.format(pet.createTime, 'yyyy-MM-dd HH:mm:ss')}"></span>
            </div>
            <div class="detail-item">
                <span class="detail-label">备注：</span>
                <span class="detail-value" th:text="${pet.remark} ?: '无'"></span>
            </div>
        </div>
    </div>
</div>

<div class="detail-card">
    <div class="detail-title">照片墙</div>
    <div class="photo-wall" id="photoWall">
        <div class="no-photo" th:if="${#lists.isEmpty(pet.photos)}">
            暂无照片
        </div>
        <div class="photo-item" th:each="photo : ${pet.photos}" th:data-url="${photo.photoUrl}" onclick="viewPhoto(this)">
            <img th:src="${photo.photoUrl}" alt="宠物照片">
        </div>
    </div>
</div>

<div class="detail-card">
    <div class="detail-title">服务记录</div>
    <div th:if="${#lists.isEmpty(pet.serviceRecords)}" class="no-photo">
        暂无服务记录
    </div>
    <table class="record-table" th:if="${not #lists.isEmpty(pet.serviceRecords)}">
        <thead>
        <tr>
            <th>预约单号</th>
            <th>服务类型</th>
            <th>预约时间</th>
            <th>金额</th>
            <th>状态</th>
            <th>操作</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="record : ${pet.serviceRecords}">
            <td th:text="${record.appointmentNo}"></td>
            <td th:text="${record.serviceName}"></td>
            <td th:text="${#dates.format(record.appointmentTime, 'yyyy-MM-dd HH:mm:ss')}"></td>
            <td th:text="'¥' + ${record.amount}"></td>
            <td>
                <span class="status-badge" th:class="'status-' + ${record.status}" th:text="${record.statusName}"></span>
            </td>
            <td>
                <button class="pear-btn pear-btn-primary pear-btn-xs" th:onclick="'viewRecord(' + ${record.id} + ')'">查看</button>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
<th:block th:include="include :: footer"/>
<script>
    layui.use(['layer'], function () {
        let layer = layui.layer;

        window.viewPhoto = function (obj) {
            let url = $(obj).data('url');
            layer.open({
                type: 1,
                title: false,
                closeBtn: 0,
                shadeClose: true,
                content: '<img src="' + url + '" style="max-width: 100%; max-height: 100%; display: block; margin: 0 auto;">'
            });
        }

        window.viewRecord = function (id) {
            parent.layer.open({
                type: 2,
                title: '预约详情',
                shade: 0.1,
                area: ['800px', '600px'],
                content: rootPath + '/AppointmentController/detail/' + id
            });
        }
    });
</script>
</html>
